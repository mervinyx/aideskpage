services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharaohfolio_db
      POSTGRES_USER: pharaohfolio_user
      POSTGRES_PASSWORD: pharaohfolio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharaohfolio_user -d pharaohfolio_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/Pharaohfolio/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/Pharaohfolio
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
